name: Publish

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: 1.0.${{ github.run_number }}
      RELEASE_TAG: v1.0.${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Set version to 1.0.<build number>
        run: |
          npm version "${RELEASE_VERSION}" --no-git-tag-version --allow-same-version
          echo "Publishing version ${RELEASE_VERSION}"

      - name: Package VSIX
        run: npx @vscode/vsce package -o vscode-learn.vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath vscode-learn.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT || secrets.VSCE_TOKEN }}

      - name: Publish to Open VSX (optional)
        run: |
          if [ -n "$OVSX_PAT" ]; then
            npx ovsx publish vscode-learn.vsix --pat "$OVSX_PAT"
          else
            echo "OVSX_PAT secret not set — skipping Open VSX publish."
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Create GitHub Release (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: vscode-learn.vsix

      - name: Attach VSIX to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: vscode-learn.vsix
