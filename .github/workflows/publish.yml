name: Publish

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Set version to 1.0.<build number>
        run: |
          npm version "1.0.${{ github.run_number }}" --no-git-tag-version --allow-same-version
          echo "Publishing version 1.0.${{ github.run_number }}"

      - name: Package VSIX
        run: npx @vscode/vsce package -o vscode-learn.vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath vscode-learn.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT || secrets.VSCE_TOKEN }}

      - name: Publish to Open VSX (optional)
        run: |
          if [ -n "$OVSX_PAT" ]; then
            npx ovsx publish vscode-learn.vsix --pat "$OVSX_PAT"
          else
            echo "OVSX_PAT secret not set — skipping Open VSX publish."
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Attach VSIX to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-learn.vsix
